apiVersion: v1
kind: Service
metadata:
  name: banconova-service
  namespace: banconova-desarrollo
  labels:
    app: banconova
    ambiente: desarrollo
spec:
  type: NodePort
  selector:
    app: banconova
    ambiente: desarrollo
  ports:
  - name: http
    protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30001
    # Acceso: http://localhost:30001
