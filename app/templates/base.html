<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BancoNova — Banca Digital</title>
<style>
  :root {
    --navy:#0B1F3A; --navy-80:#1A3254; --navy-60:#2A4D7A;
    --gold:#C9963A; --gold-lt:#E8B55A; --cream:#F7F4EF;
    --white:#FFFFFF; --gray-10:#F2F2F2; --gray-30:#D0CEC9;
    --gray-60:#888580; --gray-90:#2C2A28;
    --green:#1A7A4A; --green-lt:#E8F5EE;
    --red:#B03030;   --red-lt:#FAEAEA;
    --radius:10px;
    --shadow:0 2px 12px rgba(11,31,58,.10);
    --shadow-lg:0 8px 32px rgba(11,31,58,.16);
    --font-display:'Georgia','Times New Roman',serif;
    --font-body:'Segoe UI',system-ui,-apple-system,sans-serif;
    --transition:.18s ease;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px;scroll-behavior:smooth}
  body{font-family:var(--font-body);background:var(--cream);color:var(--gray-90);min-height:100vh}
  button{cursor:pointer;font-family:var(--font-body)}
  input,select{font-family:var(--font-body)}

  /* TOPBAR */
  .topbar{background:var(--navy);height:60px;display:flex;align-items:center;
    justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;
    box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .topbar-brand{display:flex;align-items:center;gap:10px}
  .topbar-brand .mark{width:32px;height:32px;background:var(--gold);border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:15px;font-weight:bold;color:var(--navy)}
  .topbar-brand span{color:var(--white);font-family:var(--font-display);font-size:17px}
  .topbar-user{display:flex;align-items:center;gap:10px}
  .avatar{width:34px;height:34px;background:var(--navy-60);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;color:var(--gold-lt)}
  .name{color:rgba(255,255,255,.85);font-size:13px}
  .btn-logout{background:transparent;border:1px solid rgba(255,255,255,.25);
    color:rgba(255,255,255,.7);border-radius:6px;padding:5px 12px;font-size:12px;
    text-decoration:none;transition:all var(--transition)}
  .btn-logout:hover{background:rgba(255,255,255,.1);color:var(--white)}

  /* BOTTOM NAV */
  .bottom-nav{background:var(--white);border-top:1px solid var(--gray-30);
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:100;
    box-shadow:0 -2px 12px rgba(0,0,0,.08)}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:10px 0 8px;background:transparent;border:none;
    color:var(--gray-60);font-size:11px;gap:4px;text-decoration:none}
  .nav-item.active{color:var(--navy)}
  .nav-item svg{width:22px;height:22px;stroke-width:1.8;fill:none;stroke:currentColor}

  /* PAGE CONTENT */
  .page-content{flex:1;padding:20px 16px 100px;max-width:600px;width:100%;margin:0 auto}
  .page-title{font-family:var(--font-display);font-size:20px;color:var(--navy);
    margin-bottom:18px}
  .section-title{font-size:13px;font-weight:700;color:var(--gray-60);
    letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px}

  /* BOTONES */
  .btn-primary{width:100%;height:46px;background:var(--navy);color:var(--white);
    border:none;border-radius:var(--radius);font-size:15px;font-weight:600;
    transition:background var(--transition)}
  .btn-primary:hover{background:var(--navy-60)}

  /* FORMULARIOS */
  .form-group{margin-bottom:18px}
  .form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray-60);
    letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
  .form-group input,.form-group select{width:100%;height:44px;
    border:1.5px solid var(--gray-30);border-radius:var(--radius);
    padding:0 14px;font-size:15px;color:var(--gray-90);outline:none}
  .form-group input:focus,.form-group select:focus{border-color:var(--navy-60)}

  /* ALERTAS */
  .alert-error{background:var(--red-lt);border:1px solid var(--red);
    border-radius:var(--radius);padding:12px 16px;font-size:14px;
    color:var(--red);margin-bottom:16px;text-align:center}
  .alert-success{background:var(--green-lt);border:1px solid var(--green);
    border-radius:var(--radius);padding:12px 16px;font-size:14px;
    color:var(--green);margin-bottom:16px;text-align:center}

  /* AMBIENTE BADGE */
  .ambiente-badge{display:inline-flex;align-items:center;gap:5px;
    background:rgba(201,150,58,.2);border:1px solid rgba(201,150,58,.35);
    border-radius:20px;padding:3px 10px;font-size:11px;color:var(--gold-lt)}
  .ambiente-badge .dot{width:6px;height:6px;border-radius:50%;
    background:var(--gold);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  /* MOVIMIENTOS */
  .movement-list{display:flex;flex-direction:column;gap:2px}
  .movement{background:var(--white);border-radius:10px;padding:14px 16px;
    display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
  .mov-icon{width:40px;height:40px;border-radius:10px;display:flex;
    align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
  .mov-icon.in{background:var(--green-lt)}
  .mov-icon.out{background:var(--red-lt)}
  .mov-info{flex:1}
  .mov-info .desc{font-size:14px;color:var(--gray-90);font-weight:500}
  .mov-info .date{font-size:12px;color:var(--gray-60);margin-top:2px}
  .mov-amount{font-size:15px;font-weight:700;text-align:right}
  .mov-amount.in{color:var(--green)}
  .mov-amount.out{color:var(--red)}

  /* CARD */
  .card{background:var(--white);border-radius:14px;padding:24px;
    box-shadow:var(--shadow);margin-bottom:16px}
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
