{% extends "base.html" %}
{% block content %}
<style>
  .service-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .service-card{background:var(--white);border:1.5px solid var(--gray-30);
    border-radius:12px;padding:18px 12px 14px;text-align:center;cursor:pointer;
    box-shadow:var(--shadow);transition:all .15s}
  .service-card:hover{border-color:var(--navy);background:#EEF3F9}
  .svc-emoji{font-size:28px;margin-bottom:6px}
  .svc-name{font-size:13px;font-weight:600;color:var(--navy)}
</style>

<div style="display:flex;flex-direction:column;min-height:100vh">
  <div class="topbar">
    <div class="topbar-brand">
      <a href="/dashboard" style="background:none;border:none;color:rgba(255,255,255,.7);
        font-size:20px;text-decoration:none;margin-right:6px">←</a>
      <span>Pago de servicios</span>
    </div>
    <div class="topbar-user">
      <div class="avatar">{{ iniciales }}</div>
      <a href="/logout" class="btn-logout">Salir</a>
    </div>
  </div>

  <div class="page-content">
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    {% if exito %}<div class="alert-success">✓ {{ exito }}</div>{% endif %}

    <p class="section-title">Selecciona un servicio</p>
    <form method="POST" action="/pagos/realizar">
      <div class="service-grid">
        {% for s in servicios %}
        <label class="service-card">
          <input type="radio" name="servicio" value="{{ s.nombre }}"
            style="display:none" required>
          <div class="svc-emoji">{{ s.emoji }}</div>
          <p class="svc-name">{{ s.nombre }}</p>
          <p style="font-size:11px;color:var(--gray-60)">{{ s.desc }}</p>
        </label>
        {% endfor %}
      </div>

      <div class="card">
        <div class="form-group">
          <label>Número de cuenta / referencia</label>
          <input type="text" name="referencia" placeholder="Ej: 5501234567" required>
        </div>
        <div class="form-group">
          <label>Monto a pagar</label>
          <input type="number" name="monto" placeholder="0.00" min="1" step="0.01" required>
        </div>
        <button type="submit" class="btn-primary">Pagar ahora</button>
      </div>
    </form>
  </div>

  <nav class="bottom-nav">
    <a href="/dashboard" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </a>
    <a href="/transferencia" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      Transferir
    </a>
    <a href="/pagos" class="nav-item active">
      <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      Pagar
    </a>
    <a href="/historial" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/></svg>
      Historial
    </a>
  </nav>
</div>
{% endblock %}
