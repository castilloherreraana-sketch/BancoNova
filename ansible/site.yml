# ================================================================
#  BANCONOVA — Playbook principal
#  Ejecuta todos los roles en orden para configurar
#  los servidores de desarrollo y producción
#
#  Uso:
#    Todos los ambientes:   ansible-playbook site.yml
#    Solo desarrollo:       ansible-playbook site.yml --limit desarrollo
#    Solo producción:       ansible-playbook site.yml --limit produccion
# ================================================================
---

- name: Configurar servidores de BancoNova
  hosts: servidores_banconova
  become: yes

  pre_tasks:
    - name: Mostrar información del servidor
      ansible.builtin.debug:
        msg: |
          ================================================
          Configurando servidor: {{ inventory_hostname }}
          Ambiente: {{ ambiente }}
          Versión app: {{ app_version }}
          ================================================

  roles:
    - role: servidor_base
      tags: [base, siempre]

    - role: docker
      tags: [docker]

    - role: banconova_app
      tags: [app, deploy]

  post_tasks:
    - name: Resumen final del despliegue
      ansible.builtin.debug:
        msg: |
          ================================================
          ✓ BancoNova desplegado exitosamente
          Ambiente : {{ ambiente | upper }}
          Versión  : {{ app_version }}
          URL      : {{ app_url }}
          ================================================
