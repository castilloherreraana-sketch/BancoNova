# ================================================================
#  ROL: servidor_base
#  Configura el sistema operativo base antes de instalar
#  cualquier otra herramienta en el servidor de BancoNova
# ================================================================
---

# ── 1. Actualizar paquetes del sistema ──────────────────────────
- name: Actualizar lista de paquetes
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Actualizar todos los paquetes a la última versión
  ansible.builtin.apt:
    upgrade: dist
  become: true

# ── 2. Instalar herramientas base ───────────────────────────────
- name: Instalar paquetes esenciales
  ansible.builtin.apt:
    name: "{{ paquetes_base }}"
    state: present
  become: true

# ── 3. Crear usuario de sistema para BancoNova ──────────────────
- name: Crear grupo banconova
  ansible.builtin.group:
    name: "{{ app_nombre }}"
    state: present
  become: true

- name: Crear usuario banconova sin privilegios de root
  ansible.builtin.user:
    name: "{{ app_nombre }}"
    group: "{{ app_nombre }}"
    shell: /bin/bash
    create_home: true
    comment: "Usuario de sistema BancoNova"
  become: true

# ── 4. Configurar el firewall UFW ───────────────────────────────
- name: Instalar UFW
  ansible.builtin.apt:
    name: ufw
    state: present
  become: true

- name: Habilitar UFW y establecer política por defecto
  community.general.ufw:
    state: enabled
    policy: deny
  become: true

- name: Abrir puertos necesarios en el firewall
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ puertos_firewall }}"
  become: true

# ── 5. Ajustar parámetros del kernel para Docker y K8s ─────────
- name: Cargar el módulo del kernel br_netfilter
  community.general.modprobe:
    name: br_netfilter
    state: present
  become: true

- name: Asegurar que br_netfilter se cargue en el arranque
  ansible.builtin.copy:
    dest: /etc/modules-load.d/br_netfilter.conf
    content: "br_netfilter\n"
    mode: '0644'
  become: true

- name: Habilitar bridge-nf-call-iptables para Kubernetes
  ansible.posix.sysctl:
    name: net.bridge.bridge-nf-call-iptables
    value: "1"
    state: present
    reload: true
  become: true

- name: Habilitar IP forwarding para los contenedores
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: true
  become: true

# ── 6. Configurar zona horaria ──────────────────────────────────
- name: Establecer zona horaria a America/Mexico_City
  community.general.timezone:
    name: America/Mexico_City
  become: true
  notify: Reiniciar cron

# ── 7. Verificar configuración ──────────────────────────────────
- name: Verificar que el usuario banconova fue creado
  ansible.builtin.command: id banconova
  register: resultado_usuario
  changed_when: false

- name: Mostrar resultado de verificación
  ansible.builtin.debug:
    msg: "Usuario creado correctamente: {{ resultado_usuario.stdout }}"
