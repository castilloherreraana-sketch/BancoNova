# ================================================================
#  BANCONOVA — Inventario de servidores
#  Define los hosts donde Ansible configurará y desplegará la app
# ================================================================

# ── Servidores de Desarrollo ────────────────────────────────────
[desarrollo]
dev-server ansible_host=127.0.0.1 ansible_connection=local ambiente=desarrollo puerto_app=5000 puerto_externo=30001

# ── Servidores de Producción ────────────────────────────────────
[produccion]
prod-server ansible_host=127.0.0.1 ansible_connection=local ambiente=produccion puerto_app=5000 puerto_externo=30002

# ── Grupo general: todos los servidores ─────────────────────────
[servidores_banconova:children]
desarrollo
produccion

# ── Variables comunes para todos los servidores ─────────────────
[servidores_banconova:vars]
ansible_user=ubuntu
ansible_python_interpreter=/usr/bin/python3
app_nombre=banconova
app_version=1.0.0
imagen_docker=banconova-app
