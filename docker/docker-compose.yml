services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: banconova-app:latest
    container_name: banconova-app
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - ../.env
    environment:
      AMBIENTE: ${AMBIENTE:-desarrollo}
      VERSION: ${VERSION:-1.0.0}
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
