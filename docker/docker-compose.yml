services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: banconova-app:latest
    container_name: banconova-app
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    env_file:
      - ../.env
    environment:
      AMBIENTE: ${AMBIENTE:-desarrollo}
      VERSION: ${VERSION:-1.0.0}
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-5000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
